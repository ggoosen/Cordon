<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1217"/>
      <stop offset="1" stop-color="#171c24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e08a6b"/>
      <stop offset="1" stop-color="#d97757"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- the cordon: a dashed boundary you pass through -->
  <rect x="48" y="48" width="1184" height="544" rx="22"
        fill="none" stroke="#d97757" stroke-width="2.5"
        stroke-dasharray="2 14" stroke-linecap="round" opacity="0.55"/>

  <!-- accent corner ticks -->
  <path d="M 86 48 L 48 48 L 48 86" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M 1194 48 L 1232 48 L 1232 86" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M 86 592 L 48 592 L 48 554" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M 1194 592 L 1232 592 L 1232 554" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>

  <!-- eyebrow -->
  <text x="110" y="150" font-family="Helvetica, Arial, sans-serif" font-size="26"
        font-weight="700" letter-spacing="4" fill="#d97757">CLAUDE CODE · GOVERNED SESSIONS</text>

  <!-- wordmark -->
  <text x="106" y="278" font-family="Helvetica, Arial, sans-serif" font-size="148"
        font-weight="800" letter-spacing="-2" fill="#f3f5f8">Cordon</text>

  <!-- value prop -->
  <text x="110" y="346" font-family="Helvetica, Arial, sans-serif" font-size="40"
        font-weight="600" fill="#c9d1da">Isolated · sandboxed · diff-gated by default.</text>

  <!-- flow line: labels + vector chevrons (font lacks an arrow glyph) -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#8b97a6">
    <text x="110" y="446">throwaway worktree</text>
    <text x="429.3" y="446">boundary hook</text>
    <text x="684.6" y="446">human review gate</text>
    <text x="990.1" y="446">land or discard</text>
  </g>
  <g fill="none" stroke="#d97757" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 388.3 431 L 398.3 437.5 L 388.3 444"/>
    <path d="M 643.7 431 L 653.7 437.5 L 643.7 444"/>
    <path d="M 949.2 431 L 959.2 437.5 L 949.2 444"/>
  </g>

  <!-- footer line -->
  <line x1="110" y1="500" x2="1170" y2="500" stroke="#2a313c" stroke-width="1.5"/>
  <text x="110" y="548" font-family="Helvetica, Arial, sans-serif" font-size="27"
        font-weight="500" fill="#9aa6b4">Built with nothing but Claude Code&#8217;s own primitives.</text>
  <text x="1170" y="548" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="25"
        font-weight="600" fill="#6b7682">github.com/ggoosen/Cordon</text>
</svg>
